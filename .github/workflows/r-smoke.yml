name: r-smoke

# Exercises the R layer (openair plots/stats/imports) that the Python-only
# `test.yml` never touches. check_integrations.py auto-runs the R smokes when
# R is present, degrades cor_plot gracefully without legendry, and skips
# slow/network tools unless OPENAIR_SMOKE_SLOW / OPENAIR_SMOKE_NETWORK are set.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  r-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true   # Posit binary CRAN — avoids source compiles

      - name: Cache R library
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-openair-${{ hashFiles('.github/workflows/r-smoke.yml') }}
          restore-keys: ${{ runner.os }}-r-openair-

      - name: Install R packages (openair, jsonlite)
        # legendry intentionally omitted — optional (cor_plot dendrogram only),
        # check_integrations.py degrades gracefully without it.
        run: Rscript -e 'install.packages(c("openair", "jsonlite"))'

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and dev deps
        run: pip install -e ".[dev]"

      - name: R integration smoke
        run: python check_integrations.py
